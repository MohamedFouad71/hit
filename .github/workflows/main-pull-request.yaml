name: CI

on:
  pull_request:
    branches:
    - main

jobs:
  codeql-analysis:
    uses: ./.github/workflows/codeql.yaml
    permissions:
      actions: read
      contents: read
      security-events: write

  valgrind:
    name: Valgrind memory check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run valgrind memory check
      run: |
        chmod +x ./tests/valgrind/valgrind.sh
        ./tests/valgrind/valgrind.sh

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run unit tests
      run: |
        chmod +x ./tests/unit_tests/run-tests.sh
        ./tests/unit_tests/run-tests.sh
